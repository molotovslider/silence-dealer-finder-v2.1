name: Build EXE and MAC

on: [push]

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pyinstaller beautifulsoup4 requests playwright
          python -m playwright install chromium
          python -m playwright install-deps chromium
      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name SilenceDealerFinder `
            --hidden-import=playwright `
            --hidden-import=bs4 `
            --hidden-import=requests `
            --collect-all playwright `
            app.py
      - uses: actions/upload-artifact@v4
        with:
          name: SilenceDealerFinder-Windows
          path: dist/SilenceDealerFinder.exe

  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pyinstaller beautifulsoup4 requests playwright
          python -m playwright install chromium
      - name: Build MAC
        run: |
          pyinstaller --onefile --windowed --name SilenceDealerFinder \
            --hidden-import=playwright \
            --hidden-import=bs4 \
            --hidden-import=requests \
            --collect-all playwright \
            app.py
      - uses: actions/upload-artifact@v4
        with:
          name: SilenceDealerFinder-Mac
          path: dist/SilenceDealerFinder
