name: Build Windows EXE
on: [push]
jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyinstaller beautifulsoup4 requests selenium webdriver-manager openpyxl psutil
      - run: |
          pyinstaller --onefile --windowed --name SilenceDealerFinder `
            --hidden-import=bs4 --hidden-import=requests `
            --hidden-import=selenium --hidden-import=selenium.webdriver `
            --hidden-import=selenium.webdriver.chrome.options `
            --hidden-import=selenium.webdriver.chrome.service `
            --hidden-import=webdriver_manager.chrome `
            --collect-all selenium --collect-all webdriver_manager app.py
      - uses: actions/upload-artifact@v4
        with:
          name: SilenceDealerFinder-Windows
          path: dist/SilenceDealerFinder.exe
