name: Build EXE and MAC

on: [push]

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyinstaller beautifulsoup4 requests selenium webdriver-manager
      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name SilenceDealerFinder `
            --hidden-import=bs4 `
            --hidden-import=requests `
            --hidden-import=selenium `
            --hidden-import=http.cookiejar `
            app.py
      - uses: actions/upload-artifact@v4
        with:
          name: SilenceDealerFinder-Windows
          path: dist/SilenceDealerFinder.exe

  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyinstaller beautifulsoup4 requests selenium webdriver-manager
      - name: Build MAC
        run: |
          pyinstaller --onefile --windowed --name SilenceDealerFinder \
            --hidden-import=bs4 \
            --hidden-import=requests \
            --hidden-import=selenium \
            --hidden-import=http.cookiejar \
            app.py
      - uses: actions/upload-artifact@v4
        with:
          name: SilenceDealerFinder-Mac
          path: dist/SilenceDealerFinder
