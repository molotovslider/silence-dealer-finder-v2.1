name: Build Windows EXE
on: [push]
jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pyinstaller beautifulsoup4 requests selenium webdriver-manager openpyxl psutil
      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name SilenceDealerFinder `
            --hidden-import=bs4 `
            --hidden-import=requests `
            --hidden-import=selenium `
            --hidden-import=selenium.webdriver `
            --hidden-import=selenium.webdriver.chrome `
            --hidden-import=selenium.webdriver.chrome.options `
            --hidden-import=selenium.webdriver.chrome.service `
            --hidden-import=selenium.webdriver.support `
            --hidden-import=selenium.webdriver.support.ui `
            --hidden-import=selenium.webdriver.support.expected_conditions `
            --hidden-import=webdriver_manager `
            --hidden-import=webdriver_manager.chrome `
            --hidden-import=openpyxl `
            --hidden-import=openpyxl.styles `
            --hidden-import=openpyxl.utils `
            --hidden-import=psutil `
            --hidden-import=http.cookiejar `
            --hidden-import=urllib.request `
            --hidden-import=urllib.parse `
            --hidden-import=concurrent.futures `
            --collect-all selenium `
            --collect-all webdriver_manager `
            --collect-all bs4 `
            --collect-all openpyxl `
            app.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SilenceDealerFinder-Windows
          path: dist/SilenceDealerFinder.exe
